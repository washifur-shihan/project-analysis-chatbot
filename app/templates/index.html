<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Project AI Chatbot</title>

  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}" />
</head>
<body>
  <main class="page">
    <section class="chat-shell">
      <header class="chat-header">
        <div>
          <p class="eyebrow">PMify AI Assistant</p>
          <h1>Project Knowledge Chatbot</h1>
          <p class="subtitle">
            Ask about project status, tasks, meetings, risks, issues, decisions, and action points.
          </p>
        </div>

        <button id="syncBtn" class="sync-btn" type="button">
          Sync Data
        </button>
      </header>

      <section id="chatBox" class="chat-box">
        <div class="message bot-message">
          <div class="avatar">AI</div>
          <div class="bubble">
            Hi! Ask me something like:
            <br />
            <strong>“What is the Tandob project status?”</strong>
          </div>
        </div>
      </section>

      <form id="chatForm" class="chat-form">
        <input
          id="questionInput"
          type="text"
          placeholder="Ask about your project..."
          autocomplete="off"
          required
        />
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const chatBox = document.getElementById("chatBox");
    const chatForm = document.getElementById("chatForm");
    const questionInput = document.getElementById("questionInput");
    const sendBtn = document.getElementById("sendBtn");
    const syncBtn = document.getElementById("syncBtn");

    function addMessage(text, type = "bot") {
      const message = document.createElement("div");
      message.className = `message ${type}-message`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = type === "user" ? "You" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerText = text;

      message.appendChild(avatar);
      message.appendChild(bubble);
      chatBox.appendChild(message);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addLoading() {
      const loading = document.createElement("div");
      loading.className = "message bot-message";
      loading.id = "loadingMessage";

      loading.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      `;

      chatBox.appendChild(loading);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeLoading() {
      const loading = document.getElementById("loadingMessage");
      if (loading) loading.remove();
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const question = questionInput.value.trim();
      if (!question) return;

      addMessage(question, "user");
      questionInput.value = "";
      sendBtn.disabled = true;
      addLoading();

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ question }),
        });

        const data = await response.json();

        removeLoading();

        if (!response.ok) {
          addMessage("Something went wrong. Please try again.");
          return;
        }

        addMessage(data.answer || "No answer returned.");
      } catch (error) {
        removeLoading();
        addMessage("Could not connect to the server.");
      } finally {
        sendBtn.disabled = false;
        questionInput.focus();
      }
    });

    syncBtn.addEventListener("click", async () => {
      syncBtn.disabled = true;
      syncBtn.textContent = "Syncing...";

      try {
        const response = await fetch("/sync", {
          method: "POST",
        });

        const data = await response.json();

        if (response.ok) {
          addMessage(`Knowledge synced successfully. Chunks synced: ${data.synced_chunks || 0}`);
        } else {
          addMessage("Sync failed. Please check the server logs.");
        }
      } catch (error) {
        addMessage("Could not sync data. Server connection failed.");
      } finally {
        syncBtn.disabled = false;
        syncBtn.textContent = "Sync Data";
      }
    });
  </script>
</body>
</html>
